name: Publish to npm

on:
  # Publish when a vX.Y.Z tag is pushed by a human.
  push:
    tags:
      - "v*"
  # Called by tag.yml after it bumps + pushes the tag (same run, so no
  # GITHUB_TOKEN cross-trigger restriction). `ref` is the tag to publish.
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag) to check out and publish
        required: false
        type: string
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      # Fail fast if the publish ref is a vX.Y.Z tag that doesn't match
      # package.json's version. (Skipped for workflow_call, where tag.yml has
      # already set package.json to the tagged version.)
      - name: Verify tag matches package.json version
        if: ${{ inputs.ref == '' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm test

      - run: npm run build

      # No token needed: authenticates to npm via OIDC trusted publishing.
      # Provenance is attached automatically.
      - run: npm publish --access public
