name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      # Fail fast if the tag (v1.2.3) doesn't match package.json's version.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm test

      - run: npm run build

      # No token needed: authenticates to npm via OIDC trusted publishing.
      # Provenance is attached automatically.
      - run: npm publish --access public
