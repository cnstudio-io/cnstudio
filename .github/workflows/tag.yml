name: Tag release

# Manually pick a version; this sets package.json to it, pushes a matching
# `vX.Y.Z` tag, then calls publish.yml (in the same run) to publish to npm.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.2 or v0.1.2)"
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the commit + tag
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        id: bump
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}" # accept either "0.1.2" or "v0.1.2"
          npm version "$VERSION" --allow-same-version -m "Release v%s"
          git push --follow-tags origin HEAD
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  publish:
    needs: tag
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: read
      id-token: write
    with:
      ref: ${{ needs.tag.outputs.tag }}
